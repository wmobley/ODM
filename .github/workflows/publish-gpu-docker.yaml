name: Publish GPU Docker Image (TACC fork)

on:
  workflow_dispatch:
  push:
    branches:
    - master
    tags:
    - v*

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 2880
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        buildkitd-config-inline: |
          [worker.oci]
            max-parallelism = 1
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Compute GPU dependency image
      id: gpu_deps
      shell: bash
      run: |
        set -euo pipefail
        owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
        files="${RUNNER_TEMP}/gpu-deps-files"
        {
          printf '%s\0' gpu-deps.Dockerfile configure_gpu.sh configure.sh requirements.txt
          git ls-files -z snap docker
        } | sort -z > "$files"
        hash="$(xargs -0 sha256sum < "$files" | sha256sum | awk '{print $1}')"
        image="ghcr.io/${owner}/odm-gpu-deps:${hash}"
        echo "hash=${hash}" >> "$GITHUB_OUTPUT"
        echo "image=${image}" >> "$GITHUB_OUTPUT"
    - name: Check GPU dependency image
      id: gpu_deps_exists
      shell: bash
      run: |
        if docker manifest inspect "${{ steps.gpu_deps.outputs.image }}" >/dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Build and push GPU dependency image
      if: steps.gpu_deps_exists.outputs.exists != 'true'
      uses: docker/build-push-action@v5
      with:
        file: ./gpu-deps.Dockerfile
        platforms: linux/amd64
        push: true
        cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/odm-gpu-deps:buildcache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/odm-gpu-deps:buildcache,mode=max
        tags: ${{ steps.gpu_deps.outputs.image }}
    - name: Docker meta GPU
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/odm
        tags: |
          type=semver,pattern={{version}}-gpu
          type=raw,value=gpu
          type=sha,prefix=gpu-
    - name: Build and push GPU Docker image
      id: docker_build
      uses: docker/build-push-action@v5
      with:
        file: ./gpu-work.Dockerfile
        platforms: linux/amd64
        build-args: |
          GPU_DEPS_IMAGE=${{ steps.gpu_deps.outputs.image }}
          ODM_BUILD_PROCESSES=1
          GPUCACHEBUST=${{ github.run_id }}
        push: true
        pull: true
        cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/odm:gpu-buildcache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/odm:gpu-buildcache,mode=max
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Dispatch NodeODM GPU build
      if: ${{ success() }}
      env:
        DISPATCH_TOKEN: ${{ secrets.NODEODM_DISPATCH_TOKEN }}
      run: |
        if [ -z "$DISPATCH_TOKEN" ]; then
          echo "Missing NODEODM_DISPATCH_TOKEN secret" >&2
          exit 1
        fi

        payload=$(cat <<'JSON'
        {
          "event_type": "odm-gpu-image-published",
          "client_payload": {
            "odm_image": "ghcr.io/${{ github.repository_owner }}/odm",
            "odm_tag": "ghcr.io/${{ github.repository_owner }}/odm:gpu",
            "odm_sha": "${{ github.sha }}",
            "odm_ref": "${{ github.ref_name }}",
            "odm_flavor": "gpu"
          }
        }
        JSON
        )

        curl -sS -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $DISPATCH_TOKEN" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/wmobley/NodeODM/dispatches \
          -d "$payload"
