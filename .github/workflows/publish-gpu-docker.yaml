name: Publish GPU Docker Image (TACC fork)

on:
  workflow_dispatch:
  push:
    branches:
    - master
    tags:
    - v*

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 2880
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        buildkitd-config-inline: |
          [worker.oci]
            max-parallelism = 1
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Docker meta GPU
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/odm
        tags: |
          type=semver,pattern={{version}}-gpu
          type=raw,value=gpu
          type=sha,prefix=gpu-
    - name: Build and push GPU Docker image
      id: docker_build
      uses: docker/build-push-action@v5
      with:
        file: ./gpu.Dockerfile
        platforms: linux/amd64
        build-args: |
          ODM_BUILD_PROCESSES=2
        push: true
        cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/odm:gpu-buildcache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/odm:gpu-buildcache,mode=max
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
