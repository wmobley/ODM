name: Debug PyPopSift GPU Build

on:
  workflow_dispatch:

jobs:
  pypopsift:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 90
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        buildkitd-config-inline: |
          [worker.oci]
            max-parallelism = 1
    - name: Build PyPopSift debug target
      uses: docker/build-push-action@v5
      env:
        BUILDKIT_PROGRESS: plain
      with:
        file: ./gpu.Dockerfile
        target: pypopsift-debug
        platforms: linux/amd64
        build-args: |
          ODM_BUILD_PROCESSES=2
          GPUCACHEBUST=${{ github.run_id }}
        push: false
        cache-from: |
          type=registry,ref=ghcr.io/${{ github.repository_owner }}/odm:pypopsift-debug-cache
          type=registry,ref=ghcr.io/${{ github.repository_owner }}/odm:gpu-buildcache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/odm:pypopsift-debug-cache,mode=max
